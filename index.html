<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Ultimate Brainwallet Gen</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background: #0f172a; color: #f8fafc; }
        .container { max-width: 500px; margin: 40px auto; background: #1e293b; padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .input-group { position: relative; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; padding-right: 45px; background: #334155; border: 1px solid #475569; border-radius: 8px; color: white; box-sizing: border-box; font-size: 16px; }
        input:focus { outline: 2px solid #38bdf8; border-color: transparent; }
        .toggle-password { position: absolute; right: 12px; top: 12px; cursor: pointer; color: #94a3b8; user-select: none; }
        button { width: 100%; padding: 14px; background: #0284c7; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; transition: background 0.3s; }
        button:hover { background: #0369a1; }
        #result { margin-top: 25px; padding: 20px; background: #0f172a; border-left: 4px solid #38bdf8; border-radius: 8px; display: none; white-space: pre-wrap; color: #38bdf8; font-family: monospace; font-size: 1.1em; }
        .warning { color: #fbbf24; font-size: 0.85em; margin-top: 15px; text-align: center; line-height: 1.4; }
    </style>

    <script type="module">
        import { ethers } from "https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.min.js";

        async function generate() {
            const val = document.getElementById('val').value;
            const s1 = document.getElementById('s1').value;
            //const s2 = document.getElementById('s2').value;
            const resDiv = document.getElementById('result');

            //if (!val || !s1 || !s2) {
            if (!val || !s1 ) {
                alert("Заполни все поля!");
                return;
            }

            resDiv.style.display = "block";
            resDiv.innerText = "⚡ Вычисляю (100,000,000 итераций)...";

            // Даем UI обновиться
            await new Promise(r => setTimeout(r, 100));

            try {
                // Превращаем всё в байты UTF-8 (Кириллица здесь дает + к защите)
                //const password = ethers.toUtf8Bytes(`${s1}-${s2}`);
                const password = ethers.toUtf8Bytes(s1);
                const salt = ethers.toUtf8Bytes(val);
                
                // PBKDF2 делает атаку перебором крайне дорогой
                const entropy = ethers.pbkdf2(password, salt, 1000000, 16, 'sha256');

                const mnemonic = ethers.Mnemonic.fromEntropy(entropy);
                resDiv.innerText = "Твои 12 слов:\n\n" + mnemonic.phrase;
            } catch (e) {
                resDiv.innerText = "Ошибка: " + e.message;
            }
        }

        // Логика переключения видимости
        window.toggleShow = (id) => {
            const input = document.getElementById(id);
            input.type = input.type === 'password' ? 'text' : 'password';
        };

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('genBtn').addEventListener('click', generate);
        });
    </script>
</head>
<body>
    <div class="container">
        <h2 style="text-align: center; margin-top: 0;">Brainwallet Gen 2.0</h2>
        
        <div class="input-group">
            <input type="text" id="val" placeholder="Число или кодовое слово">
        </div>

        <div class="input-group">
            <input type="password" id="s1" placeholder="Секрет">
            <span class="toggle-password" onclick="toggleShow('s1')">👁️</span>
        </div>
        <!--
        <div class="input-group">
            <input type="password" id="s2" placeholder="Секрет 2 (Фраза на англ)">
            <span class="toggle-password" onclick="toggleShow('s2')">👁️</span>
        </div>
    -->
        <button id="genBtn">Сгенерировать сид-фразу</button>
        
        <div id="result"></div>

        <div class="warning">
            ⚠️ <b>Рекомендация:</b> Используй фразы более 15 символов. <br>
            Проверь результат дважды, прежде чем переводить деньги.
        </div>
    </div>
</body>
</html>
